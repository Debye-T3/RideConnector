name: Daily Ride Briefing

on:
  workflow_dispatch:
    inputs:
      bedtime:
        description: "Last night's bedtime, for example 00:30"
        required: false
        type: string
      fatigue:
        description: "Subjective fatigue 1-10"
        required: false
        type: string
      soreness:
        description: "Leg soreness 1-10"
        required: false
        type: string
      research_pressure:
        description: "Research pressure 1-10"
        required: false
        type: string
      notes:
        description: "Extra notes, such as cold symptoms, all-nighter, lab schedule"
        required: false
        type: string
  schedule:
    # 08:00 Asia/Shanghai is 00:00 UTC.
    - cron: "0 0 * * *"

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 190
    env:
      INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
      INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID || '0' }}
      NOTIFIER: email
      EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
      EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT || '587' }}
      EMAIL_SMTP_USER: ${{ secrets.EMAIL_SMTP_USER }}
      EMAIL_SMTP_PASSWORD: ${{ secrets.EMAIL_SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS || 'true' }}
      EMAIL_USE_SSL: ${{ secrets.EMAIL_USE_SSL || 'false' }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4.1-mini' }}
      ATHLETE_PROFILE: ${{ secrets.ATHLETE_PROFILE }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      DAILY_BEDTIME: ${{ github.event.inputs.bedtime || vars.DAILY_BEDTIME || '' }}
      DAILY_FATIGUE: ${{ github.event.inputs.fatigue || vars.DAILY_FATIGUE || '' }}
      DAILY_SORENESS: ${{ github.event.inputs.soreness || vars.DAILY_SORENESS || '' }}
      DAILY_RESEARCH_PRESSURE: ${{ github.event.inputs.research_pressure || vars.DAILY_RESEARCH_PRESSURE || '' }}
      DAILY_CHECKIN_NOTES: ${{ github.event.inputs.notes || vars.DAILY_CHECKIN_NOTES || '' }}
      TZ: Asia/Shanghai
      WEIGHT_LOSS_MODE: "true"
      WAIT_FOR_SLEEP: "true"
      SLEEP_POLL_SECONDS: "900"
      SLEEP_WAIT_ATTEMPTS: "13"
      DATABASE_PATH: data/ride_connector.sqlite3
      LOG_LEVEL: INFO
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install .

      - name: Send daily briefing
        run: python -m ride_connector.jobs.daily_push --once
