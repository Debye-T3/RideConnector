name: Daily Ride Feedback

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  feedback:
    if: contains(github.event.issue.labels.*.name, 'daily-feedback') || startsWith(github.event.issue.title, 'Daily feedback:')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
      INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID || '0' }}
      NOTIFIER: email
      EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
      EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT || '587' }}
      EMAIL_SMTP_USER: ${{ secrets.EMAIL_SMTP_USER }}
      EMAIL_SMTP_PASSWORD: ${{ secrets.EMAIL_SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS || 'true' }}
      EMAIL_USE_SSL: ${{ secrets.EMAIL_USE_SSL || 'false' }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4.1-mini' }}
      ATHLETE_PROFILE: ${{ secrets.ATHLETE_PROFILE }}
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      TZ: Asia/Shanghai
      WEIGHT_LOSS_MODE: "true"
      DATABASE_PATH: data/ride_connector.sqlite3
      LOG_LEVEL: INFO
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install .

      - name: Process feedback
        run: python -m ride_connector.jobs.feedback --issue-number "${{ github.event.issue.number }}"
